workflows:

  # ---------------------------------------------------------------------------
  # Internal Testing — si attiva su push al branch develop
  # ---------------------------------------------------------------------------
  scadenze-dispensa-internal:
    name: Scadenze Dispensa → Internal Testing
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        APP_DIR: apps/scadenze_dispensa/mobile
        PACKAGE_NAME: com.progettogazza.scadenzedispensa
      android_signing:
        - scadenze_dispensa_keystore   # nome del keystore in Codemagic > Settings > Code signing
      groups:
        - google_play_credentials      # gruppo variabili in Codemagic > Settings > Environment variables
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
    scripts:
      - name: Install dependencies
        script: cd $APP_DIR && npm ci

      - name: Build Android AAB (test)
        script: |
          cd $APP_DIR/android
          ./gradlew bundleRelease \
            -PENV=test \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - apps/scadenze_dispensa/mobile/android/app/build/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
        track: internal
        submit_as_draft: false


  # ---------------------------------------------------------------------------
  # Production — si attiva su push al branch main
  # ---------------------------------------------------------------------------
  scadenze-dispensa-production:
    name: Scadenze Dispensa → Production
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        APP_DIR: apps/scadenze_dispensa/mobile
        PACKAGE_NAME: com.progettogazza.scadenzedispensa
      android_signing:
        - scadenze_dispensa_keystore
      groups:
        - google_play_credentials
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "scadenze-dispensa/v*"
          include: true
    scripts:
      - name: Install dependencies
        script: cd $APP_DIR && npm ci

      - name: Build Android AAB (prod)
        script: |
          cd $APP_DIR/android
          ./gradlew bundleRelease \
            -PENV=prod \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - apps/scadenze_dispensa/mobile/android/app/build/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
        track: production
        submit_as_draft: false
